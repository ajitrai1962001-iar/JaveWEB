<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Display a feature layer</title>
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <!-- Load Esri Leaflet from CDN -->
    <script src="https://unpkg.com/esri-leaflet@3.0.19/dist/esri-leaflet.js"></script>

    <!-- Load Esri Leaflet Vector from CDN -->
    <!-- <script src="https://unpkg.com/esri-leaflet-vector@4.3.2/dist/esri-leaflet-vector.js" crossorigin=""></script> -->
    <style>
      html,
      body,
      #map {
        padding: 0;
        margin: 0;
        height: 100%;
        width: 100%;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 14px;
        color: #323232;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
     // const accessToken = "YOUR_ACCESS_TOKEN";

      const map = L.map("map").setView([27.5, 90.4], 8);

    //   L.esri.Vector.vectorBasemapLayer("arcgis/navigation", {
    //     token: accessToken
    //   }).addTo(map);

     L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
}).addTo(map);


      // add boundry layer
      L.esri
        .featureLayer({
          url: "https://nsdi.systems.gov.bt/server/rest/services/Hosted/Dzongkhag_Boundary/FeatureServer/0/"
        })
        .addTo(map);

   // add education layer
      L.esri
        .featureLayer({
          url: "https://nsdi.systems.gov.bt/server/rest/services/Hosted/Education_Centers/FeatureServer/0"
        })
        .addTo(map);

           // add settlement layer
      L.esri
        .featureLayer({
          url: "https://nsdi.systems.gov.bt/server/rest/services/Hosted/Education_Centers/FeatureServer/0"
        })
        .addTo(map);

    </script>
  </body>
</html>
